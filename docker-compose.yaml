version: "3.9"

services:

  php:
    build:
      context: .
      dockerfile: Docker/php/Dockerfile
    container_name: symfony_php
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://app:app@db:5432/app?serverVersion=16&charset=utf8"
    depends_on:
      - db

  nginx:
    build:
      context: .
      dockerfile: Docker/nginx/Dockerfile
    container_name: symfony_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./Docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: postgres:16
    container_name: symfony_postgres
    restart: always
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: