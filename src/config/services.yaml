# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.user_api_url: '%env(USER_API_URL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Domain/Model/'
            - '../src/Domain/ValueObject/'
            - '../src/Domain/Exception/'
            - '../src/Domain/Factory/UserFactoryInterface.php'
            - '../src/Kernel.php'

    # Controllers
    App\UI\Http\Controller\:
        resource: '../src/UI/Http/Controller/'
        tags: ['controller.service_arguments']

    # Application Layer (Command Handlers, Query Handlers)
    App\Application\:
        resource: '../src/Application/'

    # Infrastructure Layer (Repositories, Adapters)
    App\Infrastructure\:
        resource: '../src/Infrastructure/'

    # Domain Services
    App\Domain\Service\:
        resource: '../src/Domain/Service/'

    # Domain Factory
    App\Domain\Factory\:
        resource: '../src/Domain/Factory/'
        exclude:
            - '../src/Domain/Factory/UserFactoryInterface.php'

    # Configure JsonPlaceholderUserAdapter with API URL from environment
    App\Infrastructure\Adapter\JsonPlaceholderUserAdapter:
        arguments:
            $apiUrl: '%app.user_api_url%'

    # Bind interfaces to implementations
    App\Domain\Repository\UserRepositoryInterface:
        alias: App\Infrastructure\Repository\DoctrineUserRepository

    App\Domain\Service\UserApiAdapterInterface:
        alias: App\Infrastructure\Adapter\JsonPlaceholderUserAdapter

    App\Domain\Factory\UserFactoryInterface:
        alias: App\Domain\Factory\UserFactory

